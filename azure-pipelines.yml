# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: Build Spring Boot and Docker image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:

    # [추가된 핵심 단계] 1. Spring Boot 코드를 .jar 파일로 빌드
    - script: |
        chmod +x gradlew
        ./gradlew bootJar
      displayName: '1. Build Spring Boot JAR via Gradle'

    # [기존 단계] 2. 만들어진 .jar 파일을 포함하여 도커 이미지 빌드
    - task: Docker@2
      displayName: '2. Build a Docker image'
      inputs:
        command: build
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(tag)
